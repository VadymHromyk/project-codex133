<div id="contact-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
  <div class="modal__backdrop"></div>
  <div class="modal__window">
    <button class="modal__close-btn" type="button" aria-label="Закрити модальне вікно">
      <svg width="24" height="24" aria-hidden="true">
        <use href="./img/icons/sprite.svg#close"></use>
      </svg>
    </button>

    <h2 id="contact-modal-title" class="modal__title title">Оформлення замовлення</h2>

    <form class="modal__form" id="contact-form" novalidate>
      <div class="form-field">
        <label class="form-field__label" for="contact-name">Ім'я*</label>
        <input
          class="form-field__input"
          id="contact-name"
          name="name"
          type="text"
          placeholder="Вікторія"
          autocomplete="given-name"
          required
        />
        <span class="form-field__error" role="alert"></span>
      </div>

      <div class="form-field">
        <label class="form-field__label" for="contact-phone">Телефон*</label>
        <input
          class="form-field__input"
          id="contact-phone"
          name="phone"
          type="tel"
          placeholder="38 0__ ________"
          autocomplete="tel"
          required
        />
        <span class="form-field__error" role="alert"></span>
      </div>

      <div class="form-field">
        <label class="form-field__label" for="contact-comment">Коментар*</label>
        <textarea
          class="form-field__input form-field__input--textarea"
          id="contact-comment"
          name="comment"
          placeholder="Ваш коментар"
          required
        ></textarea>
        <span class="form-field__error" role="alert"></span>
      </div>

      <button class="modal__submit-btn" type="submit">
        <span class="modal__submit-text">Надіслати заявку</span>
        <span class="modal__loader" aria-hidden="true"></span>
      </button>
    </form>
  </div>
</div>
