<section class="feedbacks-section">
  <div class="container">
    <h2 class="section-title">Відгуки клієнтів</h2>
    <p class="section-description">
      Найкращі десерти, які я коли-небудь куштував!
    </p>

    <div class="swiper-rel-wrapper">
      <button
        type="button"
        class="gallery__button-prev"
        aria-label="Попередній відгук"
      >
        &#8592;
      </button>

      <div class="swiper gallery__swiper">
        <div class="swiper-wrapper" id="feedbacks-container"></div>
      </div>

      <button
        type="button"
        class="gallery__button-next"
        aria-label="Наступний відгук"
      >
        &#8594;
      </button>
    </div>

    <div class="slider-layout-wrapper">
      <div class="slider-controls-group">
        <div class="swiper-pagination gallery__pagination"></div>
        <div class="mobile-buttons-placeholder"></div>
      </div>
    </div>
  </div>
</section>
