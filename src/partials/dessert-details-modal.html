<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">

    <button class="modal-close" id="modalClose" aria-label="Закрити">
      <svg width="32" height="32">
        <use href="/img/icons/sprite.svg#close"></use>
      </svg>
    </button>

    <div class="modal-image">
      <img id="modalImg" src="" alt="" />
    </div>

    <div class="modal-content">

      <span class="modal-tag" id="modalTag"></span>
      <h3 class="modal-title" id="modalTitle"></h3>
      <div class="modal-stars" id="modalStars"></div>

      <div class="modal-divider"></div>

      <p class="modal-desc" id="modalDesc"></p>
      <p class="modal-ingredients" id="modalIngredients"></p>

      <div class="modal-footer">
        <p class="modal-price" id="modalPrice"></p>
        <button class="modal-btn" id="modalOrderBtn">Перейти до замовлення</button>
      </div>

    </div>
  </div>
</div>
